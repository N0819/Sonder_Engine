<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sonder Engine — Join a Story</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<!-- Shares the host app's actual stylesheet (tokens, .turn/.pin/.prose,
     button variants) rather than a hand-rolled parallel palette -- a
     guest's first-ever impression of the app used to share nothing
     visually with what the host sees: different accent, different
     radii, different focus ring, filled-blue buttons where the host UI
     defaults to a gray gradient. Only guest-page-specific layout
     (the join screen, the composer bar) is defined locally below. -->
<link rel="stylesheet" href="/static/styles.css">
<style>
  body { display: flex; flex-direction: column; }
  header {
    padding: 14px 18px; border-bottom: 1px solid var(--bd);
    display: flex; align-items: center; gap: 10px; min-height: 50px;
    background: rgba(18,23,34,.9); backdrop-filter: blur(14px);
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 650; }
  header .sub { color: var(--dim); font-size: 13px; }
  #join-screen, #play-screen { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  #join-screen { align-items: center; justify-content: center; padding: 24px; gap: 14px; }
  #join-screen .card { width: min(360px, 100%); display: flex; flex-direction: column; gap: 12px; }
  #code-input { text-transform: uppercase; letter-spacing: .05em; }
  .err { color: var(--err); font-size: 13px; min-height: 18px; }
  #msgs { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
  .turn .waiting { color: var(--dim); font-style: italic; }
  #composer {
    display: flex; gap: 8px; padding: 14px 18px; border-top: 1px solid var(--bd);
  }
  #composer textarea { flex: 1; resize: none; height: 52px; max-height: 160px; }
</style>
</head>
<body>
<header>
  <h1>Sonder Engine</h1>
  <span class="sub" id="head-sub">Join a friend's story</span>
</header>

<div id="join-screen">
  <div class="card">
    <div>Enter the join code your friend gave you.</div>
    <input id="code-input" placeholder="ABCD1234" autocomplete="off" autocapitalize="characters" maxlength="8">
    <button id="join-btn" class="primary">Join story</button>
    <div class="err" id="join-err"></div>
  </div>
</div>

<div id="play-screen" style="display:none">
  <div id="msgs"></div>
  <div id="composer">
    <textarea id="input" placeholder="Act, speak, or leave empty…"></textarea>
    <button id="send-btn" class="primary">Send</button>
  </div>
</div>

<script>
"use strict";
const codeInput = document.getElementById("code-input");
const joinBtn = document.getElementById("join-btn");
const joinErr = document.getElementById("join-err");
const joinScreen = document.getElementById("join-screen");
const playScreen = document.getElementById("play-screen");
const headSub = document.getElementById("head-sub");
const msgsEl = document.getElementById("msgs");
const inputEl = document.getElementById("input");
const sendBtn = document.getElementById("send-btn");

const params = new URLSearchParams(location.search);
if (params.get("code")) codeInput.value = params.get("code").toUpperCase();

async function api(method, url, body) {
  const res = await fetch(url, {
    method,
    headers: { "Content-Type": "application/json" },
    body: body === undefined ? undefined : JSON.stringify(body),
  });
  const text = await res.text();
  let data;
  try { data = JSON.parse(text) } catch (e) { data = { detail: text } }
  if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
  return data;
}

async function doJoin() {
  const code = codeInput.value.trim().toUpperCase();
  if (!code) return;
  joinBtn.disabled = true;
  joinErr.textContent = "";
  try {
    const r = await api("POST", "/api/join", { code });
    headSub.textContent = `${r.chat_name} — playing as ${r.persona_name}`;
    joinScreen.style.display = "none";
    playScreen.style.display = "flex";
    startPolling();
  } catch (e) {
    joinErr.textContent = e.message;
  } finally {
    joinBtn.disabled = false;
  }
}
joinBtn.onclick = doJoin;
codeInput.addEventListener("keydown", e => { if (e.key === "Enter") doJoin() });

let nextIdx = 0;
let busy = false;

function render(turns) {
  msgsEl.innerHTML = "";
  for (const t of turns) {
    const d = document.createElement("div");
    d.className = "turn";
    if (t.player_input) {
      const pin = document.createElement("div");
      pin.className = "pin";
      pin.textContent = t.player_input;
      d.appendChild(pin);
    }
    const prose = document.createElement("div");
    if (t.prose) {
      prose.className = "prose";
      prose.textContent = t.prose;
    } else {
      prose.className = "waiting";
      prose.textContent = "Waiting for this beat to resolve…";
    }
    d.appendChild(prose);
    msgsEl.appendChild(d);
  }
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

async function refresh() {
  try {
    const state = await api("GET", "/api/guest/state");
    nextIdx = state.next_idx;
    render(state.turns);
  } catch (e) {
    // A revoked/expired session shows up here; leave the last known
    // view up rather than clearing it, and just stop polling.
    headSub.textContent = "Connection lost — " + e.message;
    clearInterval(pollHandle);
  }
}

let pollHandle = null;
function startPolling() {
  refresh();
  pollHandle = setInterval(refresh, 10000);
}

async function send() {
  const text = inputEl.value.trim();
  if (busy) return;
  busy = true;
  sendBtn.disabled = true;
  try {
    await api("POST", "/api/guest/input", { idx: nextIdx, input: text });
    inputEl.value = "";
    await refresh();
  } catch (e) {
    alert(e.message);
  } finally {
    busy = false;
    sendBtn.disabled = false;
  }
}
sendBtn.onclick = send;
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) { e.preventDefault(); send() }
});
</script>
</body>
</html>
